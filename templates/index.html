<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanban Board</title>
    <!-- Tailwind via CDN: no build step, fine for local dev/learning. -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-4">
      <h1 class="text-xl font-semibold text-slate-800">Kanban Board</h1>
    </header>

    <main id="board" class="p-6 flex gap-4 items-start overflow-x-auto"></main>

    <!-- Socket.IO client: must match the server's Socket.IO protocol. -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/board.js"></script>
  </body>
</html>
